<script defer>
/* PHOTOGRAPH index — runtime only (no build step, no manifest).

   For every `.idx-row[data-photo="NNN"]` the JS tries to fetch
   `photograph-NNN.html`:

     - 404 / network error  → the row is hidden (`display: none`).
     - otherwise            → DOMParser reads the detail page and fills:
         .idx-title ← .art-title-ja / .p2-title-ja
         .idx-sub   ← .art-title-en / .p2-title-en  +  ' — ' + PLACE
         .idx-date  ← YYYY.MM.DD (from the detail page's [data-photo-file])
         thumbnail  ← the same image file

   The header count (`#idxCount`) and footer range (`#idxRange`) are
   derived from the NNN values whose fetches succeeded.

   Hardcoded values already inside each row are used as fallbacks while
   the fetch is in flight, so the page degrades gracefully even if the
   browser blocks fetch() (e.g. strict `file://` mode — open via a local
   server or Safari for full rendering). */
(function(){
  var DIR = 'images/photograph/';
  var NAME_RE = /^(\d{3})_(\d{2})_([A-Za-z]+)_(\d{4})_(\d{2})(\d{2})\.jpg$/i;

  function stripJa(text){
    return (text || '').replace(/[\s\u3000]+/g, '');
  }
  function stripEn(el){
    if (!el) return '';
    var clone = el.cloneNode(true);
    // Drop the decorative trailing period.
    clone.querySelectorAll('.dot').forEach(function(n){ n.remove(); });
    return (clone.textContent || '').replace(/\s+/g, ' ').trim();
  }

  function parseDetail(html){
    var doc = new DOMParser().parseFromString(html, 'text/html');
    if (!doc) return null;
    var jaEl = doc.querySelector('.art-title-ja, .p2-title-ja');
    var enEl = doc.querySelector('.art-title-en, .p2-title-en');
    var figEl = doc.querySelector('[data-photo-file]');

    var file = figEl ? figEl.getAttribute('data-photo-file') : '';
    var place = '', y = '', mo = '', d = '';
    if (file) {
      var m = NAME_RE.exec(file);
      if (m) { place = m[3].toUpperCase(); y = m[4]; mo = m[5]; d = m[6]; }
    }
    return {
      ja:    stripJa(jaEl && jaEl.textContent),
      en:    stripEn(enEl),
      file:  file,
      place: place,
      y: y, mo: mo, d: d
    };
  }

  function applyToRow(row, data){
    var titleEl = row.querySelector('.idx-title');
    if (titleEl && data.ja) titleEl.textContent = data.ja;

    var subEl = row.querySelector('.idx-sub');
    if (subEl) {
      var en    = data.en || '';
      var place = data.place || '';
      if (en && place)      subEl.textContent = en + ' — ' + place;
      else if (en)          subEl.textContent = en;
      else if (place)       subEl.textContent = place;
    }

    var dateEl = row.querySelector('.idx-date');
    if (dateEl && data.y) dateEl.textContent = data.y + '.' + data.mo + '.' + data.d;

    var thumb = document.createElement('span');
    thumb.className = 'idx-row-thumb';
    if (data.file) {
      var img = document.createElement('img');
      img.alt = '';
      img.loading = 'lazy';
      img.src = DIR + data.file;
      img.onerror = function(){
        thumb.classList.remove('has-image');
        if (img.parentNode) thumb.removeChild(img);
      };
      thumb.appendChild(img);
      thumb.classList.add('has-image');
    }
    row.appendChild(thumb);
  }

  function init(){
    var rows = Array.prototype.slice.call(document.querySelectorAll('#idxList .idx-row'));
    if (!rows.length) return;

    var countEl = document.getElementById('idxCount');
    var rangeEl = document.getElementById('idxRange');
    var pad = function(v){ return ('000' + v).slice(-3); };

    var liveNos = [];

    var jobs = rows.map(function(row){
      var no = row.getAttribute('data-photo');
      if (!no) return Promise.resolve();

      return fetch('photograph-' + no + '.html', { method: 'GET' })
        .then(function(res){
          if (!res.ok) throw new Error('not found');
          return res.text();
        })
        .then(function(html){
          var data = parseDetail(html);
          if (!data) throw new Error('parse failed');
          row.setAttribute('href', 'photograph-' + no + '.html');
          applyToRow(row, data);
          liveNos.push(no);
        })
        .catch(function(){
          row.style.display = 'none';
          row.setAttribute('aria-hidden', 'true');
        });
    });

    Promise.all(jobs).then(function(){
      var nums = liveNos.map(function(n){ return parseInt(n, 10); })
                        .filter(function(v){ return !isNaN(v); });
      if (nums.length) {
        var min = Math.min.apply(null, nums);
        var max = Math.max.apply(null, nums);
        if (countEl) countEl.textContent = pad(max);
        if (rangeEl) rangeEl.textContent = 'INDEX · ' + pad(min) + ' — ' + pad(max);
      } else {
        if (countEl) countEl.textContent = '000';
        if (rangeEl) rangeEl.textContent = 'INDEX · —';
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, { once: true });
  } else {
    init();
  }
})();
</script>
