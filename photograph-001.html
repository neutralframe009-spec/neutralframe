      <h1 class="p2-title-ja">雪が止んだ日２</h1>
      <div class="p2-title-en">The day snow stopped<span class="dot">.</span></div>
      <div class="p2-body">
        <p>朝、音が戻ってきた気配で目が覚めた。雪が止んだのだと、窓を開けずに分かった。</p>
        <p>外に出ると、昨日まであったはずの道が、別の高さでそこにあった。足跡のない白の上を、誰かに先んじて歩くのは少し気が引ける。</p>
        <p>橋を渡り切ったあたりで一度だけ振り返った。自分の歩幅が、思っていたよりずっと小さく残っていた。</p>
