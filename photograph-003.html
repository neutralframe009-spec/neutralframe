  <h1 class="art-title-ja">湖岸を歩く</h1>
  <div class="art-title-en">At the lake<span class="dot">.</span></div>

  <figure id="fig-main" class="p1-figure" data-photo-file="003_01_tokyo_2026_0417.jpg">
    <div class="top-photo">
      <img alt="">
    </div>
    <figcaption class="p1-fig-caption">
      <div class="p1-fig-meta">
        FIG. <span data-photo-fig></span><br>
        <span data-photo-date></span><br>
        <span data-photo-place></span>
      </div>
      <div class="p1-body">
        <p>風のない朝だった。水面は鏡のようで、対岸の木立がそのままかたちを残している。人の気配はなく、自分の足音だけが水辺の小石に返ってくる。</p>
        <p>ここに来るのは三度目で、毎回同じ位置に立つ。景色は変わるが、立つ場所は変わらない。その差分だけを記録していきたいと思っている。</p>
        <p>写真を一枚だけ撮って、あとは歩いた。何かを持ち帰るのではなく、何かを置いてくるための時間。</p>
      </div>
    </figcaption>
  </figure>
