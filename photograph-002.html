        <p>静かな昼の光が、窓の桟に落ちていた。白は色ではなく、何かが居ないことの証拠だと、ふと思う。</p>
        <p>カーテンを引くでも、開けるでもなく、ただその白さを見ていた。撮るために立ち上がるのに、少し時間がかかった。</p>
